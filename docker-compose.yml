# ============================================================================
# 网络设备原厂实施项目管理系统 - 开发环境 Docker Compose
# ============================================================================
# 中间件默认启动；应用服务通过 profile=app 控制，默认不启动便于本地调试。
#
# 常用命令：
#   仅启动中间件（开发调试）：  docker compose up -d
#   启动全部（含应用）：        docker compose --profile app up -d
#   查看日志：                  docker compose logs -f <service>
#   停止并清理：                docker compose down
#   清理并删除数据卷：          docker compose down -v
# ============================================================================

version: "3.8"

services:
  # ---------------------------------------------------------------------------
  # MySQL 8.0 数据库
  # ---------------------------------------------------------------------------
  mysql:
    image: mysql:8.0
    container_name: vibe-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: vibe123
      MYSQL_DATABASE: vibe_db
      MYSQL_CHARSET: utf8mb4
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_general_ci
      - --default-authentication-plugin=mysql_native_password
    volumes:
      - ./docker/mysql/data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
      # 挂载数据库初始化脚本（schema.sql / data.sql）供 init.sql 引用
      - ./vibe-server/vibe-server-bootstrap/src/main/resources/db:/docker-entrypoint-initdb.d/db-scripts:ro
    healthcheck:
      test:
        - "CMD"
        - "mysqladmin"
        - "ping"
        - "-h"
        - "127.0.0.1"
        - "-uroot"
        - "-pvibe123"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - vibe-net

  # ---------------------------------------------------------------------------
  # Redis 7 缓存
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: vibe-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - vibe123
    volumes:
      - ./docker/redis/data:/data
    healthcheck:
      test:
        - "CMD"
        - "redis-cli"
        - "-a"
        - "vibe123"
        - "ping"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - vibe-net

  # ---------------------------------------------------------------------------
  # MinIO 对象存储
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: vibe-minio
    restart: unless-stopped
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # 管理控制台
    environment:
      MINIO_ROOT_USER: vibe
      MINIO_ROOT_PASSWORD: vibe123456
    command: server /data --console-address ":9001"
    volumes:
      - ./docker/minio/data:/data
    healthcheck:
      test:
        - "CMD"
        - "curl"
        - "-f"
        - "http://localhost:9000/minio/health/ready"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - vibe-net

  # ---------------------------------------------------------------------------
  # RabbitMQ 3.12 消息队列（含管理界面）
  # ---------------------------------------------------------------------------
  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: vibe-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # 管理界面
    environment:
      RABBITMQ_DEFAULT_USER: vibe
      RABBITMQ_DEFAULT_PASS: vibe123
      RABBITMQ_DEFAULT_VHOST: /
    volumes:
      - ./docker/rabbitmq/data:/var/lib/rabbitmq
    healthcheck:
      test:
        - "CMD"
        - "rabbitmq-diagnostics"
        - "-q"
        - "ping"
      interval: 15s
      timeout: 10s
      retries: 6
      start_period: 30s
    networks:
      - vibe-net

  # ---------------------------------------------------------------------------
  # vibe-server 后端应用（Spring Boot 3.2 / JDK 17）
  # 默认不启动，需指定 profile：docker compose --profile app up -d vibe-server
  # ---------------------------------------------------------------------------
  vibe-server:
    profiles: [ "app" ]
    build:
      context: ./vibe-server
      dockerfile: Dockerfile
    image: vibe-server:latest
    container_name: vibe-server
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/vibe_db?useUnicode=true&characterEncoding=utf8mb4&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: vibe123
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      SPRING_DATA_REDIS_PASSWORD: vibe123
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: vibe
      MINIO_SECRET_KEY: vibe123456
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: "5672"
      SPRING_RABBITMQ_USERNAME: vibe
      SPRING_RABBITMQ_PASSWORD: vibe123
      TZ: Asia/Shanghai
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - vibe-net

  # ---------------------------------------------------------------------------
  # vibe-web 前端应用（Vue 3 + Nginx 1.25）
  # 默认不启动，需指定 profile：docker compose --profile app up -d vibe-web
  # ---------------------------------------------------------------------------
  vibe-web:
    profiles: [ "app" ]
    build:
      context: ./vibe-web
      dockerfile: Dockerfile
    image: vibe-web:latest
    container_name: vibe-web
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - vibe-server
    networks:
      - vibe-net

  # ---------------------------------------------------------------------------
  # vibe-mobile 移动端 H5（工程师现场作业）
  # 默认不启动，需指定 profile：docker compose --profile app up -d vibe-mobile
  # ---------------------------------------------------------------------------
  vibe-mobile:
    profiles: [ "app" ]
    build:
      context: ./vibe-mobile
      dockerfile: Dockerfile
    image: vibe-mobile:latest
    container_name: vibe-mobile
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - ./docker/nginx/vibe-mobile.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - vibe-server
    networks:
      - vibe-net

  # ---------------------------------------------------------------------------
  # vibe-portal 外部门户 H5（客户/代理商入口）
  # 默认不启动，需指定 profile：docker compose --profile app up -d vibe-portal
  # ---------------------------------------------------------------------------
  vibe-portal:
    profiles: [ "app" ]
    build:
      context: ./vibe-portal
      dockerfile: Dockerfile
    image: vibe-portal:latest
    container_name: vibe-portal
    restart: unless-stopped
    ports:
      - "8082:80"
    volumes:
      - ./docker/nginx/vibe-portal.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - vibe-server
    networks:
      - vibe-net

networks:
  vibe-net:
    name: vibe-net
    driver: bridge
