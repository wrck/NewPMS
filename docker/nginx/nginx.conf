# ============================================================================
# Nginx 1.25 配置 - vibe-web 前端静态资源 + vibe-server API 反向代理
# 挂载路径：/etc/nginx/conf.d/default.conf
# ============================================================================

server {
    listen       80;
    listen  [::]:80;
    server_name  _;

    # 前端静态资源根目录（由 vibe-web 镜像构建时复制到 /usr/share/nginx/html）
    root   /usr/share/nginx/html;
    index  index.html;

    # --------------------------------------------------------------------------
    # Gzip 压缩
    # --------------------------------------------------------------------------
    gzip on;
    gzip_min_length 1k;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/xml image/svg+xml;
    gzip_vary on;
    gzip_disable "msie6";

    # --------------------------------------------------------------------------
    # API 反向代理 → vibe-server:8080
    # 前端通过 /api/v1 调用后端，转发时保留原始 URI
    # --------------------------------------------------------------------------
    location /api/ {
        proxy_pass http://vibe-server:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 上传文件大小限制
        client_max_body_size 200m;

        # WebSocket 支持（如启用 Knife4j 增强 / 后续推送）
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # --------------------------------------------------------------------------
    # 静态资源缓存策略
    # --------------------------------------------------------------------------
    location ~* \.(?:css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # --------------------------------------------------------------------------
    # Vue Router history 模式 fallback：未命中的路由统一返回 index.html
    # --------------------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --------------------------------------------------------------------------
    # 错误页面
    # --------------------------------------------------------------------------
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
}
