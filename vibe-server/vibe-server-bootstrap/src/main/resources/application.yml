# ==================== Vibe Server 公共配置 ====================
server:
  # 端口支持环境变量 VIBE_SERVER_PORT 覆盖，默认 8080
  # 集中配置见项目根目录 .env.ports
  port: ${VIBE_SERVER_PORT:8080}
  servlet:
    context-path: /
  tomcat:
    uri-encoding: UTF-8
    max-threads: 200
    accept-count: 100

spring:
  profiles:
    active: dev
  application:
    name: vibe-server
  # Jackson
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    default-property-inclusion: non_null
  # 文件上传
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 200MB
  # MVC
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false
  # Flyway 数据库迁移（替代 spring.sql.init，管理 V2+ 增量 DDL）
  # V1__baseline.sql 为占位脚本，标记现有 schema.sql 内容为基线（baseline-version=1）
  # baseline-on-migrate=true：首次对已有数据库执行时自动建立 baseline，不会清空既有表
  # 新表（customer_preference/lowcode_*/...）与 integration_config 字段扩展均由 Flyway 管理
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1
    out-of-order: false
    validate-on-migrate: true
    # 默认表名 flyway_schema_history；如需隔离可配置 table
    # encoding 默认 UTF-8，与 MySQL utf8mb4 对齐
  # Elasticsearch 8.x（默认本地单节点，生产通过环境变量覆盖）
  elasticsearch:
    uris: ${VIBE_ES_URIS:http://localhost:9200}
    connection-timeout: 5s
    socket-timeout: 30s
    # ES 8.x 默认开启 HTTPS 与账号密码；本地开发环境关闭安全特性，无需配置 username/password
    username: ${VIBE_ES_USERNAME:}
    password: ${VIBE_ES_PASSWORD:}
  # Spring Cloud OpenFeign（声明式 HTTP 客户端，4 个 Adapter 对接 ERP/IM/物流/OA 外部系统）
  cloud:
    openfeign:
      enabled: true
      # 默认使用 HttpURLConnection，可切换为 OkHttp 或 Apache HttpClient
      client:
        config:
          default:
            connect-timeout: 5000
            read-timeout: 15000
            logger-level: BASIC
      # 自动配置压缩
      compression:
        response:
          enabled: true
        request:
          enabled: true

# Resilience4j 熔断/重试配置（4 个 Adapter 独立阈值）
# erp-adapter：50% 失败率熔断，10 分钟后半开试探，3 次重试
# im-adapter：30% 失败率熔断（IM 系统敏感），5 分钟半开
# logistics-adapter：50% 失败率熔断，10 分钟半开
# oa-adapter：50% 失败率熔断，10 分钟半开
resilience4j:
  circuitbreaker:
    instances:
      erp-adapter:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10m
        sliding-window-size: 10
        permitted-number-of-calls-in-half-open-state: 3
        sliding-window-type: COUNT_BASED
        automatic-transition-from-open-to-half-open-enabled: true
        register-health-indicator: true
      im-adapter:
        failure-rate-threshold: 30
        wait-duration-in-open-state: 5m
        sliding-window-size: 10
        permitted-number-of-calls-in-half-open-state: 3
        sliding-window-type: COUNT_BASED
        automatic-transition-from-open-to-half-open-enabled: true
        register-health-indicator: true
      logistics-adapter:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10m
        sliding-window-size: 10
        permitted-number-of-calls-in-half-open-state: 3
        sliding-window-type: COUNT_BASED
        automatic-transition-from-open-to-half-open-enabled: true
        register-health-indicator: true
      oa-adapter:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10m
        sliding-window-size: 10
        permitted-number-of-calls-in-half-open-state: 3
        sliding-window-type: COUNT_BASED
        automatic-transition-from-open-to-half-open-enabled: true
        register-health-indicator: true
  retry:
    instances:
      erp-adapter:
        max-attempts: 3
        wait-duration: 1s
        retry-exceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
          - feign.RetryableException
      im-adapter:
        max-attempts: 2
        wait-duration: 500ms
        retry-exceptions:
          - java.io.IOException
          - feign.RetryableException
      logistics-adapter:
        max-attempts: 3
        wait-duration: 1s
        retry-exceptions:
          - java.io.IOException
          - feign.RetryableException
      oa-adapter:
        max-attempts: 3
        wait-duration: 1s
        retry-exceptions:
          - java.io.IOException
          - feign.RetryableException

# 外部系统集成接入点配置（4 个 Adapter 默认 disabled，通过环境变量覆盖启用）
integration:
  erp:
    url: ${VIBE_ERP_URL:http://erp.example.com/api}
    enabled: ${VIBE_ERP_ENABLED:false}
  im:
    url: ${VIBE_IM_URL:http://im.example.com/api}
    enabled: ${VIBE_IM_ENABLED:false}
  logistics:
    url: ${VIBE_LOGISTICS_URL:http://logistics.example.com/api}
    enabled: ${VIBE_LOGISTICS_ENABLED:false}
  oa:
    url: ${VIBE_OA_URL:http://oa.example.com/api}
    enabled: ${VIBE_OA_ENABLED:false}

# MyBatis-Plus
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.vibe.**.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    call-setters-on-nulls: true
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
  global-config:
    banner: false
    db-config:
      # 雪花算法主键
      id-type: ASSIGN_ID
      # 逻辑删除
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# Flowable 7 工作流引擎
# 自动建表（38 张 ACT_* 表）、自动部署 classpath:/processes/ 下的 BPMN 2.0 流程定义
flowable:
  # 数据库 schema 自动更新（create-upgrade），首次启动自动建表
  database-schema-update: true
  # 启用异步执行器（定时任务/异步服务任务执行所需）
  async-executor-activate: true
  # 流程定义文件扫描路径：classpath:/processes/*.bpmn20.xml
  process-definition-location-prefix: classpath:/processes/
  # 历史数据级别：full（保留全部历史，包括流程变量与表单属性，便于审计追溯）
  history-level: full
  # 关闭 Flowable 启动 Banner（由 Spring Boot 统一管理）
  banner: false

# XXL-JOB 2.4 分布式任务调度
# 调度中心地址（默认本地 docker-compose 暴露 8081 端口；容器内通过 http://xxl-job-admin:8080/xxl-job-admin 访问）
xxl:
  job:
    # 调度中心地址列表，多地址逗号分隔
    admin:
      addresses: ${VIBE_XXL_JOB_ADMIN:http://localhost:8081/xxl-job-admin}
    # 执行器通讯 Token，需与调度中心配置一致
    access-token: ${VIBE_XXL_JOB_TOKEN:vibe-xxl-job-token}
    executor:
      # 执行器AppName，调度中心据此分发任务
      appname: vibe-server
      # 执行器内嵌服务端口（默认9999）
      port: ${VIBE_XXL_JOB_PORT:9999}
      # 执行器日志路径
      logpath: /data/applogs/xxl-job/jobhandler
      # 日志保留天数（超过自动清理）
      logretentiondays: 30

# JWT（com.vibe.utils.JwtUtils 读取 vibe.jwt.* 前缀）
vibe:
  # ElasticSearch 聚合查询开关（Task 7：高并发聚合查询走 ES，默认 false 兜底 MySQL）
  # 启用后 ManagementCockpitServiceImpl 的 getProjectPhaseDistribution/getProjectTrend 走 ES terms/date_histogram 聚合
  # 明细查询始终走 MySQL + Caffeine 二级缓存，与本开关无关
  es:
    enabled: ${VIBE_ES_ENABLED:false}
  jwt:
    # 密钥（生产环境通过环境变量 VIBE_JWT_SECRET 覆盖，至少 32 字节）
    secret: ${VIBE_JWT_SECRET:vibe-secret-key-for-jwt-signing-please-change-in-production-2024}
    issuer: vibe
    # 多类型用户认证 Token 有效期（Task 5：按 userType 独立配置）
    # 内部用户 INTERNAL：8h（PC 端默认）
    # 代理商 AGENT：7d（H5 端长期登录）
    # 客户 CUSTOMER：2h（H5 端临时会话）
    token-validity:
      internal: ${VIBE_JWT_TTL_INTERNAL:28800}
      agent: ${VIBE_JWT_TTL_AGENT:604800}
      customer: ${VIBE_JWT_TTL_CUSTOMER:7200}
  minio:
    # MinIO 配置（com.vibe.config.MinioConfig 读取 vibe.minio.* 前缀）
    endpoint: ${VIBE_MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${VIBE_MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${VIBE_MINIO_SECRET_KEY:minioadmin}
    bucket: ${VIBE_MINIO_BUCKET:vibe}
    secure: false
    default-expiry: 604800

# Knife4j / OpenAPI 3
knife4j:
  enable: true
  setting:
    language: zh_cn
    enable-version: true
    enable-swagger-models: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: default
      paths-to-match: /**
      packages-to-scan: com.vibe

# 日志
logging:
  config: classpath:logback-spring.xml
  level:
    com.vibe: info
  # Task 10：链路追踪日志格式（与 logback-spring.xml LOG_PATTERN 对齐）
  # Micrometer Tracing 自动将 traceId/spanId 注入 MDC，此处通过 pattern.level 在日志级别字段后追加 traceId/spanId
  # 格式示例：INFO [vibe-server,a1b2c3d4e5f6,7g8h9i0j1k2l]
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"

# Spring Boot Actuator 管理端点
management:
  # Task 10：Micrometer Tracing 采样配置（适配 Spring Boot 3.2，替代 Spring Cloud Sleuth）
  tracing:
    sampling:
      # 采样率：1.0 = 100% 采样（生产环境建议 0.1 降低开销；开发/测试全量采样便于排查）
      probability: 1.0
  # Task 10：Zipkin 链路追踪上报配置
  # Zipkin Server 默认本地 9411 端口；生产环境通过环境变量 VIBE_ZIPKIN_ENDPOINT 覆盖
  # docker-compose 中可通过 http://zipkin:9411/api/v2/spans 访问容器内 Zipkin
  zipkin:
    tracing:
      endpoint: ${VIBE_ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}
  # 暴露健康检查与 tracing 端点（生产环境按需收紧）
  endpoints:
    web:
      exposure:
        include: health,info,metrics,tracing
