# ==================== Vibe Server 公共配置 ====================
server:
  port: 8080
  servlet:
    context-path: /
  tomcat:
    uri-encoding: UTF-8
    max-threads: 200
    accept-count: 100

spring:
  profiles:
    active: dev
  application:
    name: vibe-server
  # Jackson
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    default-property-inclusion: non_null
  # 文件上传
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 200MB
  # MVC
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false

# MyBatis-Plus
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.vibe.**.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    call-setters-on-nulls: true
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
  global-config:
    banner: false
    db-config:
      # 雪花算法主键
      id-type: ASSIGN_ID
      # 逻辑删除
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT（com.vibe.utils.JwtUtils 读取 vibe.jwt.* 前缀）
vibe:
  jwt:
    # 密钥（生产环境通过环境变量 VIBE_JWT_SECRET 覆盖，至少 32 字节）
    secret: ${VIBE_JWT_SECRET:vibe-secret-key-for-jwt-signing-please-change-in-production-2024}
    issuer: vibe
  minio:
    # MinIO 配置（com.vibe.config.MinioConfig 读取 vibe.minio.* 前缀）
    endpoint: ${VIBE_MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${VIBE_MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${VIBE_MINIO_SECRET_KEY:minioadmin}
    bucket: ${VIBE_MINIO_BUCKET:vibe}
    secure: false
    default-expiry: 604800

# Knife4j / OpenAPI 3
knife4j:
  enable: true
  setting:
    language: zh_cn
    enable-version: true
    enable-swagger-models: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: default
      paths-to-match: /**
      packages-to-scan: com.vibe

# 日志
logging:
  config: classpath:logback-spring.xml
  level:
    com.vibe: info
